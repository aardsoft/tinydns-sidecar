name: Build cert-manager webhook

on:
  push:
    branches:
      - master
    tags:
      - '*'
  workflow_dispatch:

jobs:
  build-webhook:
    runs-on: opensuse-leap16-imgbuild
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: cert-manager-webhook-tinydns/go.mod
          cache-dependency-path: cert-manager-webhook-tinydns/go.sum

      - name: Detect git tag
        id: refs
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "git_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "git_tag=" >> $GITHUB_OUTPUT
          fi

      - name: Login to GitHub Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build amd64 binary
        run: |
          mkdir -p container-image/root/usr/bin
          cd cert-manager-webhook-tinydns
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" \
            -o ../container-image/root/usr/bin/cert-manager-webhook-tinydns

      - name: Build amd64 image
        id: build-amd64
        uses: aardsoft/ci-actions/kiwi-build@master
        with:
          image-directory: container-image
          extra-repositories: https://download.opensuse.org/repositories/home:/bhwachter:/server/openSUSE_Leap_16.0/
          repository: https://download.opensuse.org/distribution/leap/16.0/repo/oss
          arch-suffix: amd64

      - name: Build arm64 binary
        run: |
          cd cert-manager-webhook-tinydns
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" \
            -o ../container-image/root/usr/bin/cert-manager-webhook-tinydns

      - name: Build aarch64 image
        uses: aardsoft/ci-actions/kiwi-build@master
        with:
          image-directory: container-image
          extra-repositories: https://download.opensuse.org/repositories/home:/bhwachter:/server/openSUSE_Leap_16.0/
          repository: https://download.opensuse.org/distribution/leap/16.0/repo/oss
          arch-suffix: aarch64
          target-arch: aarch64

      - name: Create multi-arch manifest
        uses: aardsoft/ci-actions/create-manifest@master
        with:
          container-name: ${{ steps.build-amd64.outputs.container-name }}
          container-tag: ${{ steps.build-amd64.outputs.container-tag }}
          architectures: amd64 aarch64
          git-tag: ${{ steps.refs.outputs.git_tag }}
